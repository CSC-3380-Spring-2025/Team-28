<!DOCTYPE html>
<html>
  <head>
    <title>Hobby Tracker - Signup Form</title>

    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
      integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" type="text/css" href="signupStyle.css" />
  </head>
  <body>
    <br />
    <br />
    <br />
    <div class="container">
      <div class="row">
        <div class="col-md-3"></div>

        <div class="col-md-6 main">
          <form action="http://localhost:3000/sign_up" method="post">
            <h1>Hobby Tracker</h1>

            <input
              class="box"
              type="text"
              name="userName"
              id="userName"
              placeholder="Username"
              required
            /><br />

            <input
              class="box"
              type="userEmail"
              name="userEmail"
              id="userEmail"
              placeholder="E-Mail "
              required
            /><br />

            <input
              class="box"
              type="userPass"
              name="userPass"
              id="userPass"
              pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
              placeholder="Password"
              title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
              required
            /><br />
            <input
              class="box"
              type="userConfirm"
              name="userConfirm"
              id="userConfirm"
              pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
              placeholder="Confirm Password"
              title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
              required
            /><br />

            <input
              type="submit"
              id="submitDetails"
              name="submitDetails"
              value="Sign Up"
            /><br />
          </form>
        </div>

        <div class="col-md-3"></div>
      </div>
    </div>
  </body>
</html>
